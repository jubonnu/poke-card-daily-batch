# 日次差分バッチの GitHub Actions 例
# 使用方法: .github/workflows/daily-batch.yml にコピーし、
# リポジトリの Secrets に POKEMON_API_KEY, SUPABASE_URL, SUPABASE_SERVICE_ROLE_KEY を設定

name: Daily Diff Batch

on:
  schedule:
    # 毎日 6:00 JST (UTC 21:00)
    - cron: "0 21 * * *"
  workflow_dispatch: # 手動実行も可能

jobs:
  batch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run batch:diff
        env:
          POKEMON_API_KEY: ${{ secrets.POKEMON_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: npm run batch:diff
